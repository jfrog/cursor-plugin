name: Validate Template

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate marketplace template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Skills are vendored from jfrog/jfrog-skills only at release time
      # (see .gitignore + plugins/<plugin>/.vendor.json). Sync them
      # before validation so plugin.json's skill paths resolve.
      - name: Sync skills from upstream
        run: node .github/scripts/sync-skills.mjs

      - name: Run template validation
        run: node scripts/validate-template.mjs
